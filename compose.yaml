services:
  httpd:
    image: busybox
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ./mta-sts.txt:/www/.well-known/mta-sts.txt:ro
    command: ["httpd", "-f", "-p", "80", "-h", "/www"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 6M # minimum memory limit 6M
